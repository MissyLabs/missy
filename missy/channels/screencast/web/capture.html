<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missy Screen Capture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
    background: #1a1a2e; color: #e0e0e0; min-height: 100vh;
    display: flex; flex-direction: column;
  }
  .header {
    background: #16213e; padding: 12px 20px; display: flex;
    align-items: center; gap: 12px; border-bottom: 1px solid #0f3460;
  }
  .header h1 { font-size: 16px; font-weight: 600; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #666; flex-shrink: 0;
  }
  .status-dot.connected { background: #4caf50; }
  .status-dot.error { background: #f44336; }
  .status-dot.capturing { background: #4caf50; animation: pulse 2s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .status-text { font-size: 13px; color: #aaa; flex: 1; }
  .controls {
    background: #16213e; padding: 12px 20px; display: flex;
    align-items: center; gap: 12px; border-bottom: 1px solid #0f3460;
  }
  button {
    padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: background 0.2s;
  }
  #startBtn {
    background: #4caf50; color: white;
  }
  #startBtn:hover { background: #45a049; }
  #startBtn:disabled { background: #555; cursor: not-allowed; }
  #stopBtn {
    background: #f44336; color: white;
  }
  #stopBtn:hover { background: #d32f2f; }
  #stopBtn:disabled { background: #555; cursor: not-allowed; }
  select {
    padding: 8px; border: 1px solid #0f3460; border-radius: 4px;
    background: #1a1a2e; color: #e0e0e0; font-size: 13px;
  }
  .main { display: flex; flex: 1; overflow: hidden; }
  .preview-panel {
    width: 320px; min-width: 200px; padding: 12px;
    border-right: 1px solid #0f3460; display: flex;
    flex-direction: column; gap: 8px;
  }
  .preview-panel h2 { font-size: 13px; color: #aaa; text-transform: uppercase; }
  #preview {
    width: 100%; background: #000; border-radius: 4px;
    aspect-ratio: 16/9; object-fit: contain;
  }
  .stats { font-size: 12px; color: #888; }
  .stats span { display: block; margin: 2px 0; }
  .results-panel { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .results-panel h2 { font-size: 13px; color: #aaa; text-transform: uppercase; }
  .result-entry {
    background: #16213e; border: 1px solid #0f3460; border-radius: 4px;
    padding: 10px; font-size: 13px; line-height: 1.5;
  }
  .result-entry .meta {
    font-size: 11px; color: #666; margin-bottom: 4px;
  }
  .result-entry .text { white-space: pre-wrap; }
  .error-banner {
    background: #4a1010; border: 1px solid #f44336; color: #f88;
    padding: 8px 12px; margin: 8px 20px; border-radius: 4px;
    font-size: 13px; display: none;
  }
  canvas { display: none; }
</style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <h1>Missy Screen Capture</h1>
    <span class="status-text" id="statusText">Initializing...</span>
  </div>
  <div class="error-banner" id="errorBanner"></div>
  <div class="controls">
    <button id="startBtn" disabled>Start Capture</button>
    <button id="stopBtn" disabled>Stop Capture</button>
    <label for="interval">Interval:</label>
    <select id="interval">
      <option value="5000">5s</option>
      <option value="10000" selected>10s</option>
      <option value="30000">30s</option>
      <option value="60000">60s</option>
    </select>
  </div>
  <div class="main">
    <div class="preview-panel">
      <h2>Preview</h2>
      <canvas id="canvas"></canvas>
      <img id="preview" alt="Screen preview">
      <div class="stats">
        <span id="statFrames">Frames sent: 0</span>
        <span id="statAnalyses">Analyses: 0</span>
        <span id="statSize">Last frame: -</span>
        <span id="statConn">Connection: disconnected</span>
      </div>
    </div>
    <div class="results-panel" id="results">
      <h2>Analysis Results</h2>
    </div>
  </div>
<script>
(function() {
  "use strict";

  // Read session credentials from URL query params.
  const params = new URLSearchParams(window.location.search);
  const SESSION_ID = params.get("session_id") || "";
  const TOKEN = params.get("token") || "";

  if (!SESSION_ID || !TOKEN) {
    showError("Missing session_id or token in URL. Use the link from !screen share.");
    return;
  }

  // Strip credentials from URL bar (prevent accidental sharing).
  if (window.history.replaceState) {
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  const statusDot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const intervalSelect = document.getElementById("interval");
  const canvas = document.getElementById("canvas");
  const preview = document.getElementById("preview");
  const resultsPanel = document.getElementById("results");
  const statFrames = document.getElementById("statFrames");
  const statAnalyses = document.getElementById("statAnalyses");
  const statSize = document.getElementById("statSize");
  const statConn = document.getElementById("statConn");
  const ctx = canvas.getContext("2d");

  let ws = null;
  let stream = null;
  let captureTimer = null;
  let frameSeq = 0;
  let analysisCount = 0;
  let connected = false;
  let backpressure = false;
  let reconnectDelay = 1000;
  let reconnectTimer = null;

  function setStatus(text, state) {
    statusText.textContent = text;
    statusDot.className = "status-dot" + (state ? " " + state : "");
    statConn.textContent = "Connection: " + (state || "disconnected");
  }

  function showError(msg) {
    const banner = document.getElementById("errorBanner");
    banner.textContent = msg;
    banner.style.display = "block";
    setTimeout(function() { banner.style.display = "none"; }, 10000);
  }

  function addResult(seq, text) {
    analysisCount++;
    statAnalyses.textContent = "Analyses: " + analysisCount;
    const entry = document.createElement("div");
    entry.className = "result-entry";
    const now = new Date().toLocaleTimeString();
    entry.innerHTML =
      '<div class="meta">Frame #' + seq + " at " + now + "</div>" +
      '<div class="text">' + escapeHtml(text) + "</div>";
    // Insert after the h2 header.
    const h2 = resultsPanel.querySelector("h2");
    if (h2 && h2.nextSibling) {
      resultsPanel.insertBefore(entry, h2.nextSibling);
    } else {
      resultsPanel.appendChild(entry);
    }
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.appendChild(document.createTextNode(s));
    return div.innerHTML;
  }

  function formatBytes(b) {
    if (b < 1024) return b + " B";
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + " KB";
    return (b / (1024 * 1024)).toFixed(1) + " MB";
  }

  // ---- WebSocket ----
  function connect() {
    if (ws) return;

    const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
    const url = proto + "//" + window.location.host + "/";
    setStatus("Connecting...", "");

    ws = new WebSocket(url);
    ws.binaryType = "arraybuffer";

    ws.onopen = function() {
      reconnectDelay = 1000;
      // Send auth.
      ws.send(JSON.stringify({
        type: "auth",
        session_id: SESSION_ID,
        token: TOKEN
      }));
      setStatus("Authenticating...", "");
    };

    ws.onmessage = function(ev) {
      var msg;
      try { msg = JSON.parse(ev.data); } catch(e) { return; }

      if (msg.type === "auth_ok") {
        connected = true;
        setStatus("Connected. Click Start to begin.", "connected");
        startBtn.disabled = false;
      } else if (msg.type === "auth_fail") {
        setStatus("Auth failed: " + (msg.reason || "unknown"), "error");
        showError("Authentication failed: " + (msg.reason || "unknown"));
        ws.close();
        ws = null;
      } else if (msg.type === "backpressure") {
        backpressure = true;
        setStatus("Backpressure — pausing capture", "connected");
        // Resume after a delay.
        setTimeout(function() { backpressure = false; }, 5000);
      } else if (msg.type === "analysis") {
        addResult(msg.seq || 0, msg.text || "(empty)");
      } else if (msg.type === "error") {
        showError("Server: " + (msg.message || "unknown error"));
      }
    };

    ws.onclose = function() {
      connected = false;
      ws = null;
      stopCapture();
      setStatus("Disconnected. Reconnecting...", "error");
      startBtn.disabled = true;
      // Exponential backoff reconnect.
      reconnectTimer = setTimeout(function() {
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
        connect();
      }, reconnectDelay);
    };

    ws.onerror = function() {
      // onclose will fire after this.
    };
  }

  // ---- Screen capture ----
  async function startCapture() {
    try {
      stream = await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: "always" },
        audio: false
      });
    } catch(e) {
      showError("Screen capture denied or not supported: " + e.message);
      return;
    }

    // User may stop sharing via browser chrome.
    stream.getVideoTracks()[0].addEventListener("ended", function() {
      stopCapture();
    });

    startBtn.disabled = true;
    stopBtn.disabled = false;
    setStatus("Capturing...", "capturing");

    // Send config to server.
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({
        type: "config",
        interval_ms: parseInt(intervalSelect.value, 10)
      }));
    }

    // Capture first frame immediately, then on interval.
    captureAndSend();
    captureTimer = setInterval(captureAndSend, parseInt(intervalSelect.value, 10));
  }

  function stopCapture() {
    if (captureTimer) {
      clearInterval(captureTimer);
      captureTimer = null;
    }
    if (stream) {
      stream.getTracks().forEach(function(t) { t.stop(); });
      stream = null;
    }
    startBtn.disabled = !connected;
    stopBtn.disabled = true;
    if (connected) {
      setStatus("Connected. Capture stopped.", "connected");
    }
  }

  function captureAndSend() {
    if (!stream || !ws || ws.readyState !== 1 || backpressure) return;

    var track = stream.getVideoTracks()[0];
    if (!track) return;
    var settings = track.getSettings();
    var w = settings.width || 1920;
    var h = settings.height || 1080;

    // Draw current frame to canvas.
    canvas.width = w;
    canvas.height = h;

    // Use ImageCapture if available, else video element fallback.
    if (typeof ImageCapture !== "undefined") {
      var ic = new ImageCapture(track);
      ic.grabFrame().then(function(bitmap) {
        ctx.drawImage(bitmap, 0, 0, w, h);
        sendCanvasFrame(w, h);
        bitmap.close();
      }).catch(function() {
        // Fallback: use video element.
        captureViaVideo(track, w, h);
      });
    } else {
      captureViaVideo(track, w, h);
    }
  }

  function captureViaVideo(track, w, h) {
    var video = document.createElement("video");
    video.srcObject = new MediaStream([track]);
    video.onloadeddata = function() {
      ctx.drawImage(video, 0, 0, w, h);
      sendCanvasFrame(w, h);
      video.srcObject = null;
    };
    video.play();
  }

  function sendCanvasFrame(w, h) {
    canvas.toBlob(function(blob) {
      if (!blob || !ws || ws.readyState !== 1) return;

      frameSeq++;

      // Send JSON metadata first.
      ws.send(JSON.stringify({
        type: "frame",
        format: "jpeg",
        width: w,
        height: h,
        seq: frameSeq
      }));

      // Then send binary data.
      blob.arrayBuffer().then(function(buf) {
        ws.send(buf);
        statFrames.textContent = "Frames sent: " + frameSeq;
        statSize.textContent = "Last frame: " + formatBytes(buf.byteLength);

        // Update preview thumbnail.
        var url = URL.createObjectURL(blob);
        preview.onload = function() { URL.revokeObjectURL(url); };
        preview.src = url;
      });
    }, "image/jpeg", 0.8);
  }

  // ---- Event listeners ----
  startBtn.addEventListener("click", startCapture);
  stopBtn.addEventListener("click", stopCapture);
  intervalSelect.addEventListener("change", function() {
    // Update running capture interval.
    if (captureTimer) {
      clearInterval(captureTimer);
      captureTimer = setInterval(captureAndSend, parseInt(intervalSelect.value, 10));
    }
    // Notify server.
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({
        type: "config",
        interval_ms: parseInt(intervalSelect.value, 10)
      }));
    }
  });

  // Start connection.
  connect();
})();
</script>
</body>
</html>
